[package]
name = "agentfs-sdk"
version = "0.4.0-pre.6"
edition = "2021"
description = "AgentFS SDK for Rust"
license = "MIT"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
libc.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
turso = "0.4.0-pre.17"

[target.'cfg(target_os = "macos")'.dependencies]
# `aegis`'s C/NEON backend fails to compile with Apple clang on arm64 due to
# missing SHA3/NEON intrinsics (e.g. `veor3q_u8`). Enabling `pure-rust` makes
# `aegis` skip its C build script entirely on macOS.
aegis = { version = "0.9.6", features = ["pure-rust"] }

[dev-dependencies]
criterion.workspace = true
proptest.workspace = true
tempfile.workspace = true

[[bench]]
name = "overlayfs"
harness = false

[profile.bench]
debug = true
